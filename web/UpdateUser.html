<!DOCTYPE html>
<html>
    <head>
        <title>Update User</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h2>Update user</h2>
        <form action="UpdateController" method="post">
            UserName <input type="text" name="txtUserName" placeholder="Uxxx" /><br/><br/>
            Password <input type="password" name="txtPassword" /><br/><br/>
            LastName <input type="text" name="txtLastName" /><br/><br/>
            <input type="checkbox" name="chkIsAdmin" />IsAdmin<br/><br/>
            <input type="submit" value="Update" />
            <input type="reset" value="Reset"/>
            <a href="LoginController"><button type="button">Back to Menu</button></a>
        </form>
    </body>
</html>
